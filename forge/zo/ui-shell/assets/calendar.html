<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor - Calendar</title>
  <link rel="icon" href="/victor-icon.png">
  <link rel="stylesheet" href="/victor.css">
</head>
<body>
  <div id="login-screen" style="display:none;">
    <div class="login-box">
      <div class="login-avatar">V</div>
      <div class="login-title">Victor</div>
      <div class="login-subtitle">Executive Ally</div>
      <input type="password" id="password-input" class="login-input" placeholder="Enter password" autofocus>
      <button class="login-btn" onclick="authenticate()">Access</button>
    </div>
  </div>
  
  <div id="app-container">
    <nav class="victor-nav">
      <div class="nav-brand">
        <div class="nav-avatar">V</div>
        <span class="nav-title">Victor</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link"><span>⌂</span><span>Dashboard</span></a>
        <a href="emails.html" class="nav-link"><span>✉</span><span>Emails</span></a>
        <a href="calendar.html" class="nav-link active"><span>📅</span><span>Calendar</span></a>
        <a href="tasks.html" class="nav-link"><span>☑</span><span>Tasks</span></a>
        <a href="victor.html" class="nav-link"><span>💬</span><span>Chat</span></a>
        <a href="victor-dashboard.html" class="nav-link"><span>⚙</span><span>Config</span></a>
      </div>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </nav>
    
    <div class="app-content">
      <div class="card">
        <div class="card-header">
          <h1 class="card-title">Calendar</h1>
          <span id="date-display" class="text-muted"></span>
        </div>
        <div id="event-list" class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="victor-app.js"></script>
  <script>
    const auth = sessionStorage.getItem('victor-auth');
    if (auth === 'authenticated') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
      document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      loadEvents();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-container').style.display = 'none';
    }
    
    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') authenticate();
    });
    
    async function loadEvents() {
      try {
        const data = await VictorApp.api('/victor/calendar');
        const events = data.events || [];
        
        if (events.length === 0) {
          document.getElementById('event-list').innerHTML = '<div class="empty-state">No upcoming events</div>';
          return;
        }
        
        const html = events.map(e => `
          <div class="event-item">
            <div class="event-title">${escapeHtml(e.summary)}</div>
            <div class="event-time">${formatTime(e.start)} - ${formatTime(e.end)}</div>
            ${e.location ? `<div class="event-location">📍 ${escapeHtml(e.location)}</div>` : ''}
          </div>
        `).join('');
        
        document.getElementById('event-list').innerHTML = html;
      } catch (err) {
        console.error('Calendar load error:', err);
        document.getElementById('event-list').innerHTML = '<div class="empty-state error">Failed to load events</div>';
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
    
    function formatTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }
  </script>
</body>
</html>
