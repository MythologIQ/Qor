<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor - Tasks</title>
  <link rel="icon" href="/victor-icon.png">
  <link rel="stylesheet" href="/victor.css">
</head>
<body>
  <div id="login-screen" style="display:none;">
    <div class="login-box">
      <div class="login-avatar">V</div>
      <div class="login-title">Victor</div>
      <div class="login-subtitle">Executive Ally</div>
      <input type="password" id="password-input" class="login-input" placeholder="Enter password" autofocus>
      <button class="login-btn" onclick="authenticate()">Access</button>
    </div>
  </div>
  
  <div id="app-container">
    <nav class="victor-nav">
      <div class="nav-brand">
        <div class="nav-avatar">V</div>
        <span class="nav-title">Victor</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link"><span>⌂</span><span>Dashboard</span></a>
        <a href="emails.html" class="nav-link"><span>✉</span><span>Emails</span></a>
        <a href="calendar.html" class="nav-link"><span>📅</span><span>Calendar</span></a>
        <a href="tasks.html" class="nav-link active"><span>☑</span><span>Tasks</span></a>
        <a href="victor.html" class="nav-link"><span>💬</span><span>Chat</span></a>
        <a href="victor-dashboard.html" class="nav-link"><span>⚙</span><span>Config</span></a>
      </div>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </nav>
    
    <div class="app-content">
      <div class="new-task-form">
        <input type="text" id="new-task-text" class="new-task-input" placeholder="Add a new task...">
        <select id="new-task-priority" class="new-task-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <h1 class="card-title">Build Progress</h1>
            <div id="build-progress-project" class="text-muted"></div>
          </div>
          <button class="btn btn-secondary" type="button" onclick="loadBuildProgress()">Refresh</button>
        </div>
        <div id="build-progress-panel" class="loading">
          <div class="spinner" aria-hidden="true"></div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <h1 class="card-title">Tasks</h1>
          <span id="task-stats" class="text-muted"></span>
        </div>
        <div id="task-list"></div>
      </div>
    </div>
  </div>

  <script src="planning-client.js"></script>
  <script src="victor-app.js"></script>
  <script>
    document.getElementById('password-input').addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const ok = await authenticate();
        if (ok) {
          loadTasks();
          loadBuildProgress();
        }
      }
    });
    
    document.getElementById('new-task-text').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });
    
    function loadTasks() {
      const tasks = JSON.parse(localStorage.getItem('victor_tasks') || '[]');
      const active = tasks.filter(t => !t.completed).length;
      const completed = tasks.filter(t => t.completed).length;
      document.getElementById('task-stats').textContent = `${active} active, ${completed} completed`;
      
      if (tasks.length === 0) {
        document.getElementById('task-list').innerHTML = '<div class="empty-state">No tasks yet. Add one above!</div>';
        return;
      }
      
      // Sort: incomplete first, then by priority
      const priorityOrder = { high: 0, medium: 1, low: 2 };
      const sorted = [...tasks].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return priorityOrder[a.priority] - priorityOrder[b.priority];
      });
      
      const html = sorted.map(t => `
        <div class="task-item">
          <input type="checkbox" class="task-checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}')">
          <div class="task-content">
            <div class="task-text ${t.completed ? 'completed' : ''}">${escapeHtml(t.text)}</div>
            ${t.dueDate ? `<div class="task-meta">Due: ${t.dueDate}</div>` : ''}
          </div>
          <span class="badge badge-${t.priority}">${t.priority}</span>
          <button class="task-delete" onclick="deleteTask('${t.id}')">✕</button>
        </div>
      `).join('');
      
      document.getElementById('task-list').innerHTML = html;
    }

    function getProjectId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('project') || 'builder-console';
    }

    async function loadBuildProgress() {
      const panel = document.getElementById('build-progress-panel');
      const projectLabel = document.getElementById('build-progress-project');
      const projectId = getProjectId();
      projectLabel.textContent = `Project: ${projectId}`;
      panel.innerHTML = '<div class="loading"><div class="spinner" aria-hidden="true"></div></div>';

      try {
        const summary = await PlanningClient.getBuildProgress(projectId, { hours: 72, limit: 8 });
        panel.innerHTML = renderBuildProgress(summary);
      } catch (error) {
        panel.innerHTML = `<div class="empty-state error">Failed to load build progress: ${escapeHtml(error.message || 'Unknown error')}</div>`;
      }
    }

    function renderBuildProgress(summary) {
      const taskCounts = summary.taskCounts || {};
      const recent = Array.isArray(summary.recentTaskActivity) ? summary.recentTaskActivity : [];
      const blockers = Array.isArray(summary.deliveryBlockers) ? summary.deliveryBlockers : [];

      const statCards = `
        <div class="grid grid-4">
          <div class="card stat-card">
            <div class="stat-value">${taskCounts.total || 0}</div>
            <div class="stat-label">Total tasks</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value">${taskCounts.inProgress || 0}</div>
            <div class="stat-label">In progress</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value">${taskCounts.done || 0}</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value">${blockers.length}</div>
            <div class="stat-label">Delivery blockers</div>
          </div>
        </div>
      `;

      const activityHtml = recent.length
        ? recent.map((entry) => {
            const statusClass =
              entry.kind === 'blocked-attempt' ? 'badge-error' :
              entry.kind === 'created' ? 'badge-info' :
              'badge-success';
            const phaseLabel = entry.phaseId ? ` · ${escapeHtml(entry.phaseId)}` : '';
            const transition = entry.previousStatus || entry.nextStatus
              ? `<div class="task-meta">${escapeHtml(entry.previousStatus || 'none')} → ${escapeHtml(entry.nextStatus || 'n/a')}</div>`
              : '';
            return `
              <div class="task-item">
                <div class="task-content">
                  <div class="task-text">${escapeHtml(entry.title)}</div>
                  <div class="task-meta">${escapeHtml(formatTimestamp(entry.timestamp))}${phaseLabel}</div>
                  ${transition}
                  <div class="task-description">${escapeHtml(entry.reason || '')}</div>
                </div>
                <span class="badge ${statusClass}">${escapeHtml(entry.kind)}</span>
              </div>
            `;
          }).join('')
        : '<div class="empty-state">No recent build activity in the selected window.</div>';

      const blockerHtml = blockers.length
        ? `<div style="margin-top:16px;">
            <div class="text-muted" style="margin-bottom:8px;">Current delivery blockers</div>
            ${blockers.map((reason) => `<div class="task-item"><div class="task-content"><div class="task-description">${escapeHtml(reason)}</div></div></div>`).join('')}
          </div>`
        : '';

      return `
        ${statCards}
        <div style="margin-top: 16px;">
          <div class="card-header" style="padding-top: 4px;">
            <h2 class="card-title" style="font-size: 15px;">Recent build activity</h2>
            <span class="text-muted">${summary.activePhaseCount || 0} active phases</span>
          </div>
          ${activityHtml}
        </div>
        ${blockerHtml}
      `;
    }

    function formatTimestamp(value) {
      if (!value) return 'Unknown time';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleString();
    }
    
    function addTask() {
      const text = document.getElementById('new-task-text').value.trim();
      if (!text) return;
      
      const tasks = JSON.parse(localStorage.getItem('victor_tasks') || '[]');
      const task = {
        id: 'task-' + Date.now(),
        text,
        completed: false,
        priority: document.getElementById('new-task-priority').value,
        createdAt: new Date().toISOString()
      };
      
      tasks.push(task);
      localStorage.setItem('victor_tasks', JSON.stringify(tasks));
      
      document.getElementById('new-task-text').value = '';
      loadTasks();
    }
    
    function toggleTask(id) {
      const tasks = JSON.parse(localStorage.getItem('victor_tasks') || '[]');
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        localStorage.setItem('victor_tasks', JSON.stringify(tasks));
        loadTasks();
      }
    }
    
    function deleteTask(id) {
      let tasks = JSON.parse(localStorage.getItem('victor_tasks') || '[]');
      tasks = tasks.filter(t => t.id !== id);
      localStorage.setItem('victor_tasks', JSON.stringify(tasks));
      loadTasks();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    (async () => {
      const ok = await VictorApp.checkAuth();
      if (ok) {
        loadTasks();
        loadBuildProgress();
      }
    })();
  </script>
</body>
</html>
