version: '3.8'

services:
  zo-qore:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: zo-qore
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - qore-data:/app/data
      - qore-logs:/app/logs
    environment:
      - NODE_ENV=production
      - QORE_DATA_DIR=/app/data
      - QORE_LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=3000
    networks:
      - qore-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qore-data:
    driver: local
  qore-logs:
    driver: local

networks:
  qore-network:
    driver: bridge
