# qor/neo4j.conf — workspace-local Neo4j overrides for the mono-service entrypoint.
# Loaded via NEO4J_CONF_DIR export in qor/start.sh.
# Kept minimal; inherits /opt/neo4j/conf/neo4j.conf defaults for everything else.

server.default_listen_address=127.0.0.1
server.bolt.listen_address=127.0.0.1:7687

dbms.directories.data=/home/workspace/Projects/continuous/Qor/data/neo4j
dbms.directories.logs=/home/workspace/Projects/continuous/Qor/data/neo4j/logs
