<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor - Emails</title>
  <link rel="icon" href="/victor-icon.png">
  <link rel="stylesheet" href="/victor.css">
</head>
<body>
  <div id="login-screen" style="display:none;">
    <div class="login-box">
      <div class="login-avatar">V</div>
      <div class="login-title">Victor</div>
      <div class="login-subtitle">Executive Ally</div>
      <input type="password" id="password-input" class="login-input" placeholder="Enter password" autofocus>
      <button class="login-btn" onclick="authenticate()">Access</button>
    </div>
  </div>
  
  <div id="app-container">
    <nav class="victor-nav">
      <div class="nav-brand">
        <div class="nav-avatar">V</div>
        <span class="nav-title">Victor</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link"><span>⌂</span><span>Dashboard</span></a>
        <a href="emails.html" class="nav-link active"><span>✉</span><span>Emails</span></a>
        <a href="calendar.html" class="nav-link"><span>📅</span><span>Calendar</span></a>
        <a href="tasks.html" class="nav-link"><span>☑</span><span>Tasks</span></a>
        <a href="victor.html" class="nav-link"><span>💬</span><span>Chat</span></a>
        <a href="victor-dashboard.html" class="nav-link"><span>⚙</span><span>Config</span></a>
      </div>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </nav>
    
    <div class="app-content">
      <div class="card">
        <div class="card-header">
          <h1 class="card-title">Inbox</h1>
          <span id="email-count" class="text-muted">Loading...</span>
        </div>
        <div id="email-list" class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="victor-app.js"></script>
  <script>
    const auth = sessionStorage.getItem('victor-auth');
    if (auth === 'authenticated') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
      loadEmails();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-container').style.display = 'none';
    }
    
    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') authenticate();
    });
    
    async function loadEmails() {
      try {
        const data = await VictorApp.api('/victor/emails');
        const emails = data.emails || [];
        document.getElementById('email-count').textContent = `${emails.length} emails`;
        
        if (emails.length === 0) {
          document.getElementById('email-list').innerHTML = '<div class="empty-state">No emails found</div>';
          return;
        }
        
        const html = emails.map(e => `
          <div class="email-item">
            <div class="email-subject">${escapeHtml(e.subject)}</div>
            <div class="email-from">${escapeHtml(e.from)}</div>
            <div class="email-snippet">${escapeHtml(e.snippet)}</div>
            <div class="email-date">${e.date}</div>
          </div>
        `).join('');
        
        document.getElementById('email-list').innerHTML = html;
      } catch (err) {
        console.error('Email load error:', err);
        document.getElementById('email-list').innerHTML = '<div class="empty-state error">Failed to load emails</div>';
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
